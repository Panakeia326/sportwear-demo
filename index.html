<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Sportwear — Sourcing Intelligence</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#ffffff;--bg-2:#f7f7f6;--bg-3:#f0efed;
--text:#1a1a19;--text-2:#5f5e5a;--text-3:#9a9891;
--border:rgba(0,0,0,.10);--border-2:rgba(0,0,0,.18);
--blue:#185FA5;--blue-bg:#e6f1fb;--blue-text:#0c447c;
--green:#3B6D11;--green-bg:#eaf3de;--green-text:#27500a;
--red:#A32D2D;--red-bg:#fcebeb;--red-text:#791f1f;
--amber:#854F0B;--amber-bg:#faeeda;--amber-text:#633806;
--teal:#0F6E56;--teal-bg:#e1f5ee;--teal-text:#085041;
--nav-h:56px;--sidebar-w:220px;
}
@media(prefers-color-scheme:dark){
:root{--bg:#1c1c1a;--bg-2:#242422;--bg-3:#2c2c2a;--text:#f0efed;--text-2:#b4b2a9;--text-3:#6e6d67;}
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
a{color:var(--blue);text-decoration:none}

/* NAV */
nav.topnav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:var(--bg);border-bottom:0.5px solid var(--border-2);display:flex;align-items:center;padding:0 20px;z-index:200;gap:12px}
.nav-logo{font-weight:700;font-size:15px;letter-spacing:-.3px;color:var(--text)}
.nav-logo span{color:var(--blue)}
.nav-divider{width:0.5px;height:22px;background:var(--border-2);margin:0 4px}
.nav-subtitle{color:var(--text-3);font-size:12px}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.nav-avatar{width:30px;height:30px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--blue-text)}

/* SIDEBAR */
aside.sidebar{position:fixed;top:var(--nav-h);left:0;bottom:0;width:var(--sidebar-w);background:var(--bg-2);border-right:0.5px solid var(--border);z-index:100;overflow-y:auto;padding:16px 8px}
.sidebar-section{font-size:10px;font-weight:600;color:var(--text-3);padding:8px 10px 4px;letter-spacing:.6px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;color:var(--text-2);font-size:13px;transition:background .12s}
.nav-item:hover{background:var(--bg-3);color:var(--text)}
.nav-item.active{background:var(--blue-bg);color:var(--blue-text);font-weight:500}
.nav-item .ti{font-size:16px}

/* MAIN */
main{margin-left:var(--sidebar-w);padding-top:var(--nav-h);min-height:100vh}
.page{display:none;padding:28px 28px 48px}
.page.active{display:block}

/* TYPOGRAPHY */
h1{font-size:22px;font-weight:700;letter-spacing:-.4px}
h2{font-size:16px;font-weight:600;letter-spacing:-.2px}
h3{font-size:13px;font-weight:600}
.subtitle{color:var(--text-3);font-size:13px;margin-top:2px}
.section{margin-top:28px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}

/* CARDS */
.card{background:var(--bg);border:0.5px solid var(--border-2);border-radius:12px;padding:18px}
.cards-row{display:grid;gap:14px;grid-template-columns:repeat(4,1fr);margin-bottom:24px}
.metric-card{background:var(--bg-2);border:0.5px solid var(--border);border-radius:12px;padding:16px 18px}
.metric-label{font-size:12px;color:var(--text-3);margin-bottom:4px}
.metric-value{font-size:22px;font-weight:700;letter-spacing:-.5px}
.metric-sub{font-size:12px;color:var(--text-2);margin-top:2px}

/* CHIPS */
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500;line-height:1.6}
.chip-blue{background:var(--blue-bg);color:var(--blue-text)}
.chip-green{background:var(--green-bg);color:var(--green-text)}
.chip-red{background:var(--red-bg);color:var(--red-text)}
.chip-amber{background:var(--amber-bg);color:var(--amber-text)}
.chip-teal{background:var(--teal-bg);color:var(--teal-text)}
.chip-gray{background:var(--bg-3);color:var(--text-2)}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 12px;color:var(--text-3);font-size:11px;font-weight:600;border-bottom:0.5px solid var(--border-2);white-space:nowrap}
td{padding:9px 12px;border-bottom:0.5px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.excluded td{opacity:.5}
tr.clickable{cursor:pointer}
tr.clickable:hover td{background:var(--bg-2)}
.table-wrap{border:0.5px solid var(--border-2);border-radius:12px;overflow:hidden}

/* INLINE BAR */
.bar-wrap{display:flex;align-items:center;gap:6px}
.bar-track{width:48px;height:5px;background:var(--bg-3);border-radius:3px;overflow:hidden;flex-shrink:0}
.bar-fill{height:100%;border-radius:3px;background:var(--blue)}

/* TOGGLE */
.toggle-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.toggle-item{display:flex;align-items:center;gap:8px;background:var(--bg-2);border:0.5px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;user-select:none}
.toggle-switch{width:32px;height:18px;border-radius:9px;background:var(--bg-3);border:0.5px solid var(--border-2);position:relative;transition:background .15s;flex-shrink:0}
.toggle-switch.on{background:var(--blue)}
.toggle-switch::after{content:'';position:absolute;width:12px;height:12px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-switch.on::after{left:16px}
.toggle-label{font-size:12px;font-weight:500;color:var(--text-2)}

/* TABS */
.tabs{display:flex;gap:2px;border-bottom:0.5px solid var(--border-2);margin-bottom:18px}
.tab-btn{padding:8px 14px;font-size:13px;font-weight:500;color:var(--text-3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:color .12s,border-color .12s;background:none;border-top:none;border-left:none;border-right:none}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-btn:hover{color:var(--text)}
.tab-content{display:none}
.tab-content.active{display:block}

/* WEIGHT SLIDERS */
.weights-card{background:var(--bg);border:0.5px solid var(--border-2);border-radius:12px;padding:18px 20px;margin-bottom:18px}
.weights-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.weights-total{font-size:12px;color:var(--text-3);font-weight:400}
.weight-row{margin-bottom:14px}
.weight-row:last-child{margin-bottom:0}
.weight-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.weight-label{font-size:12.5px;color:var(--text-2);display:flex;align-items:center;gap:7px}
.weight-label i{font-size:14px;color:var(--text-3)}
.weight-pct{font-size:15px;font-weight:700;color:var(--blue);min-width:40px;text-align:right;font-variant-numeric:tabular-nums}
input[type=range].gravity{width:100%;height:8px;-webkit-appearance:none;appearance:none;border-radius:4px;outline:none;cursor:ew-resize;border:none;padding:0;margin:0}
input[type=range].gravity::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#185FA5;border:3px solid white;box-shadow:0 1px 5px rgba(0,0,0,.25);cursor:ew-resize;margin-top:-7px}
input[type=range].gravity::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#185FA5;border:3px solid white;cursor:ew-resize}
input[type=range].gravity::-webkit-slider-runnable-track{height:8px;border-radius:4px}
.weight-reset{font-size:11px;color:var(--blue);cursor:pointer;border:none;background:none;padding:0;font-family:inherit}
.weight-reset:hover{text-decoration:underline}

/* COMPONENT TABS */
.comp-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.comp-tab{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:0.5px solid var(--border-2);cursor:pointer;font-size:13px;font-weight:500;color:var(--text-2);background:var(--bg-2)}
.comp-tab.active{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue)}
.comp-tab .ti{font-size:15px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid transparent;transition:opacity .12s}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-secondary{background:var(--bg-2);color:var(--text-2);border-color:var(--border-2)}
.btn-ghost{background:transparent;color:var(--blue);border-color:var(--border)}
.btn:hover{opacity:.85}

/* RISK FLAGS */
.flag-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:8px;margin-bottom:8px;font-size:12.5px}
.flag-item.critical{background:var(--red-bg);color:var(--red-text);border:0.5px solid var(--red)}
.flag-item.warning{background:var(--amber-bg);color:var(--amber-text);border:0.5px solid var(--amber)}
.flag-item.info{background:var(--blue-bg);color:var(--blue-text);border:0.5px solid var(--blue)}
.flag-item .ti{font-size:16px;margin-top:1px;flex-shrink:0}

/* SUPPLIER TREE */
.tree-wrap{overflow-x:auto;padding:12px 0}
.tree-inner{display:flex;gap:12px;min-width:max-content;align-items:flex-start}
.tree-col{display:flex;flex-direction:column;align-items:center;width:150px}
.tier1-card{background:var(--bg-2);border:0.5px solid var(--border-2);border-radius:10px;padding:10px;width:100%;text-align:center}
.tier1-flag{font-size:20px;line-height:1}
.tier1-name{font-size:11px;font-weight:600;margin-top:4px;line-height:1.3;color:var(--text)}
.tier1-alloc{margin-top:6px}
.tree-connector{width:0.5px;height:16px;background:var(--border-2);margin:4px 0}
.tier2-stack{display:flex;flex-direction:column;gap:5px;width:100%}
.tier2-card{background:var(--bg);border:0.5px solid var(--border);border-radius:8px;padding:7px 9px;font-size:11px}
.tier2-card.missing{border-style:dashed;border-color:var(--red);background:var(--red-bg)}
.tier2-card.partial{border-color:var(--amber)}
.tier2-supplies{color:var(--text-3);font-size:10.5px;margin-top:2px}

/* NEWS FEED */
.news-item{padding:14px 0;border-bottom:0.5px solid var(--border)}
.news-item:last-child{border-bottom:none}
.news-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px}
.news-headline{font-weight:600;font-size:13.5px;margin-bottom:4px;color:var(--text)}
.news-body{font-size:12.5px;color:var(--text-2);line-height:1.6}
.news-factories{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.factory-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:6px;font-size:11px;background:var(--bg-3);color:var(--text-2);border:0.5px solid var(--border-2);cursor:pointer}
.factory-chip:hover{background:var(--blue-bg);color:var(--blue-text)}

/* INSIGHT CARDS */
.insight-card{border-radius:12px;padding:16px 18px;margin-bottom:12px;border:0.5px solid}
.insight-card.amber{background:var(--amber-bg);border-color:var(--amber);color:var(--amber-text)}
.insight-card.blue{background:var(--blue-bg);border-color:var(--blue);color:var(--blue-text)}
.insight-card.red{background:var(--red-bg);border-color:var(--red);color:var(--red-text)}
.insight-title{font-weight:600;font-size:13.5px;margin-bottom:5px;display:flex;align-items:center;gap:7px}
.insight-body{font-size:12.5px;line-height:1.6;opacity:.9}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg);border:0.5px solid var(--border-2);border-radius:16px;width:720px;max-width:95vw;max-height:88vh;overflow-y:auto;position:relative}
.modal-header{padding:22px 24px 16px;border-bottom:0.5px solid var(--border)}
.modal-body{padding:20px 24px 24px}
.modal-close{position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-3);background:var(--bg-2);border:0.5px solid var(--border)}
.modal-close:hover{color:var(--text)}
.modal-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;margin-bottom:16px}

/* PERFORMANCE ROW */
.perf-item{text-align:center;padding:12px;background:var(--bg-2);border-radius:10px;border:0.5px solid var(--border)}
.perf-val{font-size:20px;font-weight:700;color:var(--blue)}
.perf-lbl{font-size:11px;color:var(--text-3);margin-top:2px}

/* DIRECTORY GRID */
.dir-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.dir-card{background:var(--bg-2);border:0.5px solid var(--border-2);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .12s}
.dir-card:hover{border-color:var(--blue)}
.dir-card-header{padding:14px 16px 10px;display:flex;align-items:center;gap:10px}
.dir-flag{font-size:26px;line-height:1}
.dir-name{font-weight:600;font-size:13px}
.dir-loc{font-size:11px;color:var(--text-3)}
.dir-body{padding:0 16px 12px}
.dir-meta{font-size:12px;color:var(--text-2);margin-bottom:8px}
.cert-chips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.dir-footer{padding:10px 16px 14px;border-top:0.5px solid var(--border);display:flex;flex-direction:column;gap:6px}
.dir-bar-row{display:flex;align-items:center;gap:8px;font-size:11px}
.dir-bar-label{width:45px;color:var(--text-3)}
.dir-bar-track{flex:1;height:4px;background:var(--bg-3);border-radius:2px;overflow:hidden}
.dir-bar-fill{height:100%;background:var(--blue);border-radius:2px}
.dir-bar-val{width:28px;text-align:right;color:var(--text-2);font-size:11px}

/* SEARCH */
.search-wrap{display:flex;align-items:center;gap:8px;background:var(--bg-2);border:0.5px solid var(--border-2);border-radius:8px;padding:7px 12px;width:320px}
.search-wrap input{background:none;border:none;outline:none;font-size:13px;color:var(--text);flex:1}
.search-wrap .ti{color:var(--text-3)}

/* PROVENANCE */
.field-display{background:var(--bg-2);border:0.5px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.field-label{font-size:11px;color:var(--text-3);margin-bottom:3px}
.field-value{font-size:13px;color:var(--text)}
.journey-step-row{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border)}
.journey-step-row:last-child{border-bottom:none}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.step-num.ai-step{background:var(--teal)}

/* CONSUMER */
.consumer-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.product-card{background:var(--bg);border:0.5px solid var(--border-2);border-radius:16px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.product-card:hover{border-color:var(--blue)}
.product-hero{height:200px;display:flex;align-items:center;justify-content:center}
.product-info{padding:16px}
.product-name{font-size:16px;font-weight:700;margin-bottom:3px}
.product-variant{font-size:12px;color:var(--text-3);margin-bottom:10px}
.story-hero{height:240px;display:flex;align-items:center;justify-content:center;border-radius:12px;margin-bottom:24px;position:relative;overflow:hidden}
.story-hero-info{position:absolute;bottom:16px;left:20px}
.story-name{font-size:24px;font-weight:800;letter-spacing:-.5px;color:var(--text)}
.story-sku{font-size:12px;color:var(--text-2);margin-top:2px}
.specs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.spec-item{background:var(--bg-2);border:0.5px solid var(--border);border-radius:10px;padding:12px}
.spec-label{font-size:11px;color:var(--text-3);margin-bottom:4px}
.spec-value{font-size:14px;font-weight:600}
.perf-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.perf-bar-label{width:130px;font-size:12.5px;color:var(--text-2)}
.perf-bar-track{flex:1;height:8px;background:var(--bg-3);border-radius:4px;overflow:hidden}
.perf-bar-fill{height:100%;background:var(--blue);border-radius:4px}
.perf-bar-val{width:36px;text-align:right;font-size:12px;font-weight:600;color:var(--text)}
.map-wrap{background:var(--bg-2);border-radius:12px;overflow:hidden;margin-bottom:20px;border:0.5px solid var(--border)}
.journey-timeline{display:flex;flex-direction:column;gap:0}
.jt-item{display:flex;gap:14px;padding:10px 0;position:relative}
.jt-line{position:absolute;left:11px;top:28px;bottom:-10px;width:0.5px;background:var(--border-2)}
.jt-item:last-child .jt-line{display:none}
.jt-dot{width:24px;height:24px;border-radius:50%;background:var(--blue);border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;position:relative;z-index:1}
.jt-dot.ai{background:var(--teal)}
.jt-content{flex:1;padding-bottom:10px}
.jt-label{font-size:11px;color:var(--text-3)}
.jt-name{font-size:13px;font-weight:600}
.jt-detail{font-size:12px;color:var(--text-2)}
.cert-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.audit-table{width:100%}
.audit-table td:first-child{color:var(--text-3);font-size:12px;width:160px}
.audit-table td{padding:7px 0;border-bottom:0.5px solid var(--border);font-size:13px}
.back-link{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--text-2);margin-bottom:20px;cursor:pointer}
.back-link:hover{color:var(--blue)}
.disclaimer{font-size:11px;color:var(--text-3);margin-top:16px;padding:10px;background:var(--bg-2);border-radius:8px;line-height:1.5}

/* LOG */
.log-item{display:flex;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border);font-size:12.5px}
.log-time{color:var(--text-3);white-space:nowrap;width:80px;flex-shrink:0}
.log-desc{color:var(--text-2);line-height:1.5}

/* EXPANDED ROW */
.expanded-row td{padding:0!important}
.expanded-inner{padding:12px 16px;background:var(--bg-2);font-size:12.5px}
.mini-alloc-table{width:100%;font-size:12px;margin-top:6px}
.mini-alloc-table th{font-size:10px;padding:5px 8px}
.mini-alloc-table td{padding:5px 8px;border-bottom:0.5px solid var(--border)}

/* FX */
.fx-pos{color:var(--green-text);font-size:11px}
.fx-neg{color:var(--red-text);font-size:11px}
.fx-neutral{color:var(--text-3);font-size:11px}
.delta-up{color:var(--green-text)}
.delta-down{color:var(--red-text)}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}

/* MISC */
.muted{color:var(--text-3)}
.small{font-size:12px}
code{font-family:monospace}
.alloc-bar-wrap{display:flex;align-items:center;gap:6px}
.alloc-bar-track{width:60px;height:6px;background:var(--bg-3);border-radius:3px;overflow:hidden}
.alloc-bar-fill{height:100%;background:var(--blue);border-radius:3px}
.garment-row.selected td{background:var(--blue-bg)}
.two-line{display:flex;flex-direction:column}
/* VIEW SWITCHER */
.view-switcher{display:flex;background:var(--bg-3);border:0.5px solid var(--border-2);border-radius:10px;padding:3px;gap:2px;margin:0 auto}
.vsw{padding:5px 14px;border:none;background:transparent;border-radius:7px;font-size:12.5px;font-weight:500;color:var(--text-3);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;transition:all .12s;white-space:nowrap}
.vsw i{font-size:13px}
.vsw.active{background:var(--bg);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
/* STAFF VIEW — tablet optimised */
.staff-layout{display:grid;grid-template-columns:280px 1fr;gap:20px;align-items:start}
.staff-customer-card{background:var(--bg);border:0.5px solid var(--border-2);border-radius:16px;padding:22px;position:sticky;top:80px}
.staff-avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;margin:0 auto 14px;flex-shrink:0}
.staff-name{font-size:18px;font-weight:700;text-align:center;color:var(--text)}
.staff-tier{font-size:12px;text-align:center;font-weight:600;margin-top:3px}
.staff-meta-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:12.5px}
.staff-meta-row:last-child{border-bottom:none}
.staff-meta-label{color:var(--text-3)}
.staff-meta-val{font-weight:600;color:var(--text)}
.staff-consent{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:8px;font-size:12px;font-weight:500;margin-top:14px}
.staff-tabs{display:flex;border-bottom:0.5px solid var(--border-2);margin-bottom:20px}
.staff-tab{flex:1;padding:12px 8px;font-size:13px;font-weight:500;color:var(--text-3);cursor:pointer;border:none;background:transparent;border-bottom:2.5px solid transparent;font-family:inherit;transition:color .12s}
.staff-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.prompt-card{background:var(--bg);border:0.5px solid var(--border-2);border-radius:12px;padding:16px 18px;margin-bottom:12px;display:flex;gap:12px;align-items:flex-start}
.prompt-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prompt-icon i{font-size:17px}
.prompt-text{font-size:13px;color:var(--text);line-height:1.6}
.purchase-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border);font-size:13px}
.purchase-row:last-child{border-bottom:none}
.purchase-emoji{font-size:22px;width:36px;text-align:center;flex-shrink:0}
.purchase-name{font-weight:500;color:var(--text);flex:1}
.purchase-meta{font-size:11px;color:var(--text-3)}
.purchase-price{font-weight:600;color:var(--text);white-space:nowrap}
.suggestion-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.suggestion-card{background:var(--bg);border:0.5px solid var(--border-2);border-radius:12px;padding:16px;cursor:pointer;transition:border-color .12s}
.suggestion-card:hover{border-color:var(--blue)}
.suggestion-emoji{font-size:36px;margin-bottom:10px}
.suggestion-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px}
.suggestion-price{font-size:14px;font-weight:700;color:var(--blue);margin-bottom:6px}
.suggestion-reason{font-size:11px;color:var(--text-3);line-height:1.5}
.note-card{background:var(--bg-2);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.note-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.note-staff{font-size:12px;font-weight:600;color:var(--text)}
.note-date{font-size:11px;color:var(--text-3)}
.note-body{font-size:13px;color:var(--text);line-height:1.6}
.note-input{width:100%;min-height:80px;border:0.5px solid var(--border-2);border-radius:10px;padding:12px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);resize:vertical;margin-top:12px}
.note-input:focus{outline:none;border-color:var(--blue)}
.app-signal{display:flex;align-items:center;gap:8px;padding:8px 0;font-size:12.5px;border-bottom:0.5px solid var(--border)}
.app-signal:last-child{border-bottom:none}
.app-signal-icon{color:var(--blue);font-size:15px;flex-shrink:0}
.section-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px}
</style>
</head>

// ============================================================
// ALGORITHM
// ============================================================
function calcAdjCost(s){return s.baseCost*(1+s.exchRateDelta/100);}

function getEligible(comp){
  return comp.suppliers.filter(s=>{
    if(CONSTRAINTS.quality&&s.quality<82)return false;
    if(CONSTRAINTS.ethics&&s.ethics<75)return false;
    if(CONSTRAINTS.leadtime&&s.leadTime>50)return false;
    return true;
  });
}

function calcRecommended(comp){
  const eligible=getEligible(comp);
  if(eligible.length===0)return comp.suppliers.map(()=>0);
  const costs=eligible.map(s=>calcAdjCost(s));
  const minCost=Math.min(...costs);
  const maxCost=Math.max(...costs);
  const composites=eligible.map(s=>{
    const adjCost=calcAdjCost(s);
    const costScore=maxCost===minCost?1:1-(adjCost-minCost)/(maxCost-minCost);
    const riskScore=1-s.supplyRisk/100;
    return costScore*(WEIGHTS.cost/100)+(s.quality/100)*(WEIGHTS.quality/100)+(s.ethics/100)*(WEIGHTS.ethics/100)+riskScore*(WEIGHTS.risk/100);
  });
  const totalComposite=composites.reduce((a,b)=>a+b,0);
  let allocs=eligible.map((s,i)=>composites[i]/totalComposite);
  if(CONSTRAINTS.cap){
    const CAP=0.40;let maxIter=20;
    while(maxIter-->0){
      let overflow=0;let uncapped=0;
      allocs.forEach((a,i)=>{if(a>CAP){overflow+=(a-CAP);allocs[i]=CAP;}else uncapped+=a;});
      if(overflow<0.0001)break;
      allocs=allocs.map(a=>a<CAP?a+overflow*(a/uncapped):a);
    }
  }
  return comp.suppliers.map(s=>{
    const idx=eligible.findIndex(e=>e.factoryId===s.factoryId);
    return idx>=0?allocs[idx]:0;
  });
}

function calcBlendedCost(comp){
  const recs=calcRecommended(comp);
  return comp.suppliers.reduce((acc,s,i)=>acc+calcAdjCost(s)*recs[i],0);
}

function calcWeightedLeadTime(comp){
  const recs=calcRecommended(comp);
  return comp.suppliers.reduce((acc,s,i)=>acc+s.leadTime*recs[i],0);
}

  if(delta>0)return `<span class="fx-pos">▲ ${delta.toFixed(1)}%</span>`;
  return `<span class="fx-neutral">—</span>`;
}

function darkenHex(hex,amt){
  amt=amt||40;
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,r-amt);g=Math.max(0,g-amt);b=Math.max(0,b-amt);
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function buildRiskFlags(){
  const flags=[];
  COMPONENTS.forEach(comp=>{
    const n=getEligible(comp).length;
    if(n===0)flags.push({type:'critical',icon:'ti-alert-octagon',title:comp.name+' — no eligible suppliers',body:'All suppliers excluded under current constraints. Allocation is impossible.'});
    else if(n===1)flags.push({type:'critical',icon:'ti-alert-octagon',title:comp.name+' — single eligible supplier',body:'Only 1 supplier meets all constraints. Single-source risk is critical.'});
  });
  const warned=new Set();
  COMPONENTS.forEach(comp=>{
    getEligible(comp).forEach(s=>{
      if(warned.has(s.factoryId))return;
      warned.add(s.factoryId);
      const t2=TIER2[s.factoryId]||[];
      const missing=t2.filter(t=>t.status==='missing').length;
      if(missing>0){
        const f=ALL_FACTORIES[s.factoryId];
        flags.push({type:'warning',icon:'ti-alert-triangle',title:f.name+' has '+missing+' unverified tier-2 supplier'+(missing>1?'s':''),body:'Tier-2 visibility gap. Full supply chain ethics cannot be confirmed.'});
      }
    });
  });
  flags.push({type:'warning',icon:'ti-alert-triangle',title:'Shahi Exports — NGO overtime report (11 Jun 2026)',body:'Clean Clothes Campaign report links a sub-contractor to excessive overtime. Compliance review in progress.'});
  const fxWarned=new Set();
  COMPONENTS.forEach(comp=>{
    comp.suppliers.forEach(s=>{
      if(Math.abs(s.exchRateDelta)>3&&!fxWarned.has(s.factoryId)){
        fxWarned.add(s.factoryId);
        const f=ALL_FACTORIES[s.factoryId];
        flags.push({type:'info',icon:'ti-trending-up',title:f.name+' — large FX move ('+(s.exchRateDelta>0?'+':'')+s.exchRateDelta+'%)',body:'Exchange rate shift of '+Math.abs(s.exchRateDelta)+'% vs base rate. Adjust forward contracts accordingly.'});
      }
    });
  });
  return flags;
}

function selectComponent(id){selectedComponentId=id;renderAllocation();}
function toggleConstraint(key){CONSTRAINTS[key]=!CONSTRAINTS[key];renderAllocation();}

function buildRationale(eligible,comp){
  const activeW=Object.entries(WEIGHTS).filter(([,v])=>v>0).map(([k,v])=>{
    const labels={cost:'cost competitiveness',quality:'quality',ethics:'ethics',risk:'supply risk (inverse)'};
    return `${labels[k]} ${v}%`;
  }).join(', ');
  const base=`<strong>Allocation rationale:</strong> Composite score weighted by ${activeW||'no criteria — add weights above'}.${CONSTRAINTS.cap?' A 40% per-supplier cap is applied iteratively.':''}`;
  if(eligible.length===0) return base+' <em>No suppliers meet current constraints — relax one or more filters to enable allocation.</em>';
  const cheapest=eligible.reduce((a,b)=>calcAdjCost(a)<calcAdjCost(b)?a:b);
  const f=ALL_FACTORIES[cheapest.factoryId];
  return base+` ${eligible.length} supplier${eligible.length>1?'s are':' is'} eligible. Lowest adj. cost: CA$${fmt2(calcAdjCost(cheapest))} (${f.name}). Highest quality: ${Math.max(...eligible.map(s=>s.quality))}.`;
}

function syncSliderUI(){
  const isDark=matchMedia('(prefers-color-scheme:dark)').matches;
  const track=isDark?'#2c2c2a':'#e8e6e0';
  let total=0;
  Object.entries(WEIGHTS).forEach(([k,v])=>{
    total+=v;
    const el=document.getElementById('w-'+k);
    const vEl=document.getElementById('wv-'+k);
    if(el){el.value=v;el.style.background=`linear-gradient(to right,#185FA5 0%,#185FA5 ${v}%,${track} ${v}%,${track} 100%)`;}
    if(vEl) vEl.textContent=v+'%';
  });
  const tEl=document.getElementById('w-total');
  if(tEl) tEl.textContent=total;
}

function onWeightChange(key,newVal){
  newVal=Math.max(0,Math.min(100,newVal));
  const others=Object.keys(WEIGHTS).filter(k=>k!==key);
  const otherSum=others.reduce((s,k)=>s+WEIGHTS[k],0);
  const remaining=100-newVal;
  WEIGHTS[key]=newVal;
  if(otherSum===0){
    const share=Math.floor(remaining/others.length);
    others.forEach(k=>WEIGHTS[k]=share);
    WEIGHTS[others[0]]+=remaining-share*others.length;
  } else {
    let assigned=0;
    others.forEach((k,i)=>{
      if(i===others.length-1){WEIGHTS[k]=remaining-assigned;}
      else{const s=Math.round(WEIGHTS[k]/otherSum*remaining);WEIGHTS[k]=s;assigned+=s;}
    });
  }
  Object.keys(WEIGHTS).forEach(k=>WEIGHTS[k]=Math.max(0,WEIGHTS[k]));
  syncSliderUI();
  refreshAllocOutput();
}

function resetWeights(){
  Object.assign(WEIGHTS,WEIGHTS_DEFAULT);
  syncSliderUI();
  refreshAllocOutput();
}

  const savings=(comp.staticBaseCost-blended)*comp.totalUnits;

      const f=ALL_FACTORIES[s.factoryId];

        <td>${f.flag} ${f.country}</td>

        <td><strong>CA$${fmt2(adj)}</strong></td>
        <td>${barHtml(s.quality)}</td><td>${barHtml(s.ethics)}</td>
        <td>${s.leadTime}d</td><td>${barHtml(s.supplyRisk)}</td>
        <td>${(s.current*100).toFixed(0)}%</td>
        <td>${isElig?`<div class="alloc-bar-wrap"><div class="alloc-bar-track"><div class="alloc-bar-fill" style="width:${rec*100}%"></div></div><strong>${(rec*100).toFixed(1)}%</strong><span class="${delta>=0?'delta-up':'delta-down'}" style="font-size:11px;margin-left:4px">${delta>=0?'▲':'▼'}${Math.abs(delta*100).toFixed(1)}%</span></div>`:'<span class="muted">—</span>'}</td>

function applyRecommended(){
  const comp=COMPONENTS.find(c=>c.id===selectedComponentId);
  const recs=calcRecommended(comp);
  comp.suppliers.forEach((s,i)=>{s.current=recs[i];});
  renderAllocation();
}

function generateCSV(){
  const comp=COMPONENTS.find(c=>c.id===selectedComponentId);
  const recs=calcRecommended(comp);
  let csv='Factory,Country,Adj Unit Cost,Quality,Ethics,Lead Time,Supply Risk,Current %,Recommended %\n';
  comp.suppliers.forEach((s,i)=>{
    const f=ALL_FACTORIES[s.factoryId];
    csv+=`"${f.name}","${f.country}",${fmt2(calcAdjCost(s))},${s.quality},${s.ethics},${s.leadTime},${s.supplyRisk},${(s.current*100).toFixed(1)},${(recs[i]*100).toFixed(1)}\n`;
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='vertex-allocation-'+selectedComponentId+'.csv';
  a.click();
}

let _topoCache=null;

function renderD3Map(g,containerId='d3-map-wrap'){
  const wrap=document.getElementById(containerId);
  if(!wrap||typeof d3==='undefined'||typeof topojson==='undefined') return;

  const geoSteps=g.journey.filter(j=>j.lat!==null);
  const W=wrap.clientWidth||700, H=320;

  const svg=d3.select(wrap).html('').append('svg')
    .attr('width','100%').attr('height',H)
    .style('display','block');

  const isDark=matchMedia('(prefers-color-scheme:dark)').matches;
  const oceanFill=isDark?'#0c2a4a':'#e6f1fb';
  const landFill=isDark?'#1e3a52':'#c8dde8';
  const landStroke=isDark?'#2d5a7a':'#9fc5d8';
  const routeColor='#185FA5';
  const dotFill='#185FA5';
  const labelBg=isDark?'#1c2e3a':'#ffffff';
  const labelText=isDark?'#b5d4f4':'#1a1a19';

  svg.append('rect').attr('width','100%').attr('height',H).attr('fill',oceanFill);

  const proj=d3.geoNaturalEarth1().scale(140).translate([W*0.48,H*0.54]);
  const path=d3.geoPath(proj);

  const drawMap=(world)=>{
    const countries=topojson.feature(world,world.objects.countries);
    svg.append('g').selectAll('path')
      .data(countries.features).join('path')
      .attr('d',path)
      .attr('fill',landFill)
      .attr('stroke',landStroke)
      .attr('stroke-width',0.4);

    // route line (great-circle)
    if(geoSteps.length>1){
      const coords=geoSteps.map(j=>[j.lng,j.lat]);
      svg.append('path')
        .datum({type:'LineString',coordinates:coords})
        .attr('d',path)
        .attr('fill','none')
        .attr('stroke',routeColor)
        .attr('stroke-width',1.8)
        .attr('stroke-dasharray','6,5')
        .attr('opacity',0.85);
    }

    // numbered dots + labels
    geoSteps.forEach((j,i)=>{
      const [px,py]=proj([j.lng,j.lat]);
      if(!px||!py) return;

      const labelRight=px<W*0.75;
      const lx=labelRight?px+14:px-14;
      const anchor=labelRight?'start':'end';
      const text=j.city||j.name;
      const charW=6.5;
      const tw=text.length*charW+10;
      const bgX=labelRight?px+12:px-12-tw;

      // connector tick
      svg.append('line')
        .attr('x1',px).attr('y1',py)
        .attr('x2',labelRight?px+12:px-12).attr('y2',py)
        .attr('stroke',routeColor).attr('stroke-width',1).attr('opacity',0.6);

      // label pill
      svg.append('rect')
        .attr('x',bgX).attr('y',py-10).attr('width',tw).attr('height',19)
        .attr('rx',4).attr('fill',labelBg).attr('opacity',0.93);
      svg.append('text')
        .attr('x',lx).attr('y',py+4)
        .attr('text-anchor',anchor)
        .attr('font-family','system-ui,sans-serif')
        .attr('font-size',10.5).attr('font-weight',500)
        .attr('fill',labelText)
        .text(text);

      // step circle
      svg.append('circle')
        .attr('cx',px).attr('cy',py).attr('r',8)
        .attr('fill',j.type==='ai'?'#3B6D11':dotFill)
        .attr('stroke','white').attr('stroke-width',2);
      svg.append('text')
        .attr('x',px).attr('y',py+4)
        .attr('text-anchor','middle')
        .attr('font-family','system-ui,sans-serif')
        .attr('font-size',9).attr('font-weight',700)
        .attr('fill','white')
        .text(j.step);
    });
  };

  if(_topoCache){
    drawMap(_topoCache);
  } else {
    d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world=>{
      _topoCache=world;
      drawMap(world);
    }).catch(()=>{
      d3.select(wrap).html('<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9a9891;font-size:13px">Map unavailable offline</div>');
    });
  }
}

            const cu=CUSTOMERS[cb.customerId], st=STAFF_MEMBERS[cb.staffId];
            return `<option value="${i}" ${i===selectedComboIdx?'selected':''}>${cu.name} is assigned to ${st.name}</option>`;
          }).join('')}
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:8px;white-space:nowrap">
        <div style="width:30px;height:30px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--blue-text)">${S.initials}</div>
        <div style="font-size:13px"><strong>${S.name}</strong> <span style="color:var(--text-3);font-size:11px">· ${S.role}</span></div>
      </div>
    </div>
  </div>

  <div class="staff-layout">

    <!-- LEFT: Customer card -->
    <div>
      <div class="staff-customer-card">
        <div class="staff-avatar" style="background:${C.color};color:${C.textColor}">${C.initials}</div>
        <div class="staff-name">${C.name}</div>
        <div class="staff-tier" style="color:${C.color}">${C.loyaltyTier} <i class="ti ti-crown" style="font-size:12px"></i></div>

        <div style="margin:14px 0 10px">
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-3);margin-bottom:4px">
            <span>${C.loyaltyPoints.toLocaleString()} pts</span>
            <span>${C.nextTierPoints} pts to ${tierLabel}</span>
          </div>
          <div style="height:6px;background:var(--bg-3);border-radius:3px;overflow:hidden">
            <div style="height:6px;border-radius:3px;background:${C.color};width:${C.tierProgress}%"></div>
          </div>
        </div>

        <div style="border-top:0.5px solid var(--border);padding-top:10px">
          <div class="staff-meta-row"><span class="staff-meta-label">Store visits</span><span class="staff-meta-val">${C.visits}</span></div>
          <div class="staff-meta-row"><span class="staff-meta-label">Last visit</span><span class="staff-meta-val">${C.lastVisit}</span></div>
          <div class="staff-meta-row"><span class="staff-meta-label">Member since</span><span class="staff-meta-val">${C.memberSince}</span></div>
          <div class="staff-meta-row"><span class="staff-meta-label">Birthday</span><span class="staff-meta-val">${C.birthday} 🎂</span></div>
          <div class="staff-meta-row"><span class="staff-meta-label">App user</span><span class="staff-meta-val" style="color:${C.appUser?'var(--green-text)':'var(--text-3)'}">${C.appUser?'Yes ✓':'No'}</span></div>
          <div class="staff-meta-row"><span class="staff-meta-label">Activity</span><span class="staff-meta-val">${C.activityLevel}</span></div>
          <div class="staff-meta-row"><span class="staff-meta-label">Interests</span><span class="staff-meta-val" style="text-align:right">${C.interests.join(', ')}</span></div>
          <div class="staff-meta-row"><span class="staff-meta-label">Preferred size</span><span class="staff-meta-val">${C.preferredSize}</span></div>
          <div class="staff-meta-row"><span class="staff-meta-label">Typical spend</span><span class="staff-meta-val">${C.budgetRange}</span></div>
        </div>

        <div style="margin-top:14px">
          <div class="section-label">Preferred colours</div>
          <div style="display:flex;flex-wrap:wrap;gap:5px">
            ${C.preferredColors.map(c=>`<span style="font-size:11px;padding:3px 8px;border-radius:6px;background:var(--bg-3);color:var(--text-2);border:0.5px solid var(--border)">${c}</span>`).join('')}
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT: Tabbed brief -->
    <div>
      <div class="staff-tabs">
        <button class="staff-tab ${staffTab==='brief'?'active':''}" onclick="staffTab='brief';renderStaff()"><i class="ti ti-speakerphone" style="font-size:14px"></i> Today's brief</button>
        <button class="staff-tab ${staffTab==='suggestions'?'active':''}" onclick="staffTab='suggestions';renderStaff()"><i class="ti ti-sparkles" style="font-size:14px"></i> Suggestions</button>
        <button class="staff-tab ${staffTab==='notes'?'active':''}" onclick="staffTab='notes';renderStaff()"><i class="ti ti-notes" style="font-size:14px"></i> Staff notes <span style="background:var(--blue-bg);color:var(--blue-text);border-radius:10px;padding:1px 6px;font-size:10px;margin-left:4px">${C.notes.length}</span></button>
      </div>

      ${staffTab==='brief'?`
        <div class="section-label">Selling prompts for ${S.name}</div>
        ${C.prompts.map(p=>`
        <div class="prompt-card">
          <div class="prompt-icon" style="background:${p.bg}"><i class="ti ${p.icon}" style="color:${p.color}"></i></div>
          <div class="prompt-text" style="font-size:14px;font-weight:500">${p.text}</div>
        </div>`).join('')}

        <div style="margin-top:22px">
          ${C.appUser&&(C.longViewed.length||C.appSaved.length)?`
          <div class="section-label">App activity · last 30 days</div>
          <div style="background:var(--bg);border:0.5px solid var(--border-2);border-radius:12px;padding:4px 16px;margin-bottom:14px">
            ${C.longViewed.map(v=>`
            <div class="app-signal">
              <i class="ti ti-clock app-signal-icon"></i>
              <span style="flex:1;color:var(--text)"><strong>${v.name}</strong></span>
              <span style="font-size:12px;font-weight:600;color:var(--blue)">${v.duration}</span>
            </div>`).join('')}
            ${C.appSaved.map(s=>`
            <div class="app-signal">
              <i class="ti ti-heart app-signal-icon"></i>
              <span style="flex:1;color:var(--text)">Saved: <strong>${s}</strong></span>
              <span class="chip" style="background:var(--red-bg);color:var(--red-text);font-size:10px">Wishlist</span>
            </div>`).join('')}
          </div>`:''}

          <div class="section-label">Purchase history</div>
          <div style="background:var(--bg);border:0.5px solid var(--border-2);border-radius:12px;padding:4px 16px">
            ${C.purchases.map(p=>`
            <div class="purchase-row">
              <div class="purchase-emoji">${p.emoji}</div>
              <div style="flex:1">
                <div class="purchase-name">${p.name}</div>
                <div class="purchase-meta">${p.sku} · ${p.date}</div>
              </div>
              <div class="purchase-price">CA$${p.price}</div>
            </div>`).join('')}
          </div>
        </div>
      `:''}

      ${staffTab==='suggestions'?`
        <div class="section-label">Recommended for ${C.name} today</div>
        <div class="suggestion-grid">
          ${C.suggestions.map(s=>`
          <div class="suggestion-card">
            <div class="suggestion-emoji">${s.emoji}</div>
            <div class="suggestion-name">${s.name}</div>
            <div class="suggestion-price">CA$${s.price}</div>
            <div style="margin-bottom:8px"><span style="font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;background:var(--green-bg);color:var(--green-text)">${s.match}% match</span></div>
            <div class="suggestion-reason">${s.reason}</div>
          </div>`).join('')}
        </div>
        <div style="background:var(--blue-bg);border-radius:10px;padding:13px 16px;font-size:12.5px;color:var(--blue-text);line-height:1.6">
          <strong><i class="ti ti-calculator" style="font-size:13px;vertical-align:-2px"></i> Points reminder:</strong>
          ${C.name.split(' ')[0]} is ${C.nextTierPoints} pts from ${tierLabel}. Every item recommended today contributes — mention it naturally.
        </div>
      `:''}

      ${staffTab==='notes'?`
        <div class="section-label">Previous notes from staff</div>
        ${C.notes.map(n=>`
        <div class="note-card">
          <div class="note-header">
            <div>
              <span class="note-staff">${n.staff}</span>
              <span style="font-size:11px;color:var(--text-3);margin-left:6px">· ${n.role}</span>
            </div>
            <span class="note-date">${n.date}</span>
          </div>
          <div class="note-body">${n.note}</div>
        </div>`).join('')}
        <div style="margin-top:20px">
          <div class="section-label">Add a note for next visit</div>
          <textarea class="note-input" placeholder="What should the team know about ${C.name.split(' ')[0]}'s visit today?…"></textarea>
          <div style="margin-top:8px;display:flex;gap:8px">
            <button class="btn btn-primary" onclick="this.textContent='Saved ✓';this.disabled=true;setTimeout(()=>{this.textContent='Save note';this.disabled=false},2000)"><i class="ti ti-check"></i> Save note</button>
            <button class="btn btn-secondary" onclick="this.closest('div').querySelector('textarea').value=''"><i class="ti ti-trash"></i> Clear</button>
          </div>
        </div>
      `:''}
    </div>
  </div>`;
}

// ============================================================
// INIT
// ============================================================
renderDashboard();
</script>
</body>
</html>
